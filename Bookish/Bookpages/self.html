<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self - Help</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Playfair+Display:ital,wght@0,700;1,700&family=Quicksand:wght@300;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warm-brown: #6d5443;
            --sage-green: #a3b18a;
            --oatmeal: #f5f1ed;
            --terracotta: #b5838d;
            --soft-cream: #faf9f6;
            --glass-white: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: url('Book1pages/self/img/s1.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--warm-brown);
        }

        /* Floating Elements Styling */
        #aestheticOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking on books through the emojis */
            z-index: 1;
            overflow: hidden;
        }

        .element {
            position: absolute;
            opacity: 0;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.05));
            animation: floatAround 12s linear forwards;
        }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(360deg); opacity: 0; }
        }

        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: var(--warm-brown); text-decoration: none; 
            background: var(--glass-white);
            padding: 10px 20px; font-weight: 500; z-index: 100;
            text-transform: lowercase;
            border-radius: 15px; 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(109, 84, 67, 0.2);
            transition: 0.3s;
        }

        .back-nav:hover {
            background: var(--warm-brown);
            color: white;
        }

        .cover-container {
            position: relative;
            width: 90%;
            max-width: 1100px;
            height: 450px;
            margin-top: 40px;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(109, 84, 67, 0.15);
            z-index: 2;
        }

        .cover-photo { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: sepia(0.2) brightness(0.9);
        }

        .cover-title {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 100px;
            color: white;
            text-align: center;
            width: 100%;
            z-index: 3;
            letter-spacing: -2px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }

        .book-list-container {
            width: 850px; 
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            z-index: 10;
            padding-bottom: 100px;
        }

        .list-item {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .list-item:hover {
            transform: scale(1.02);
            background: #fff;
            box-shadow: 0 10px 30px rgba(109, 84, 67, 0.1);
        }

        .list-item img { 
            width: 80px; height: 115px; 
            object-fit: cover; 
            border-radius: 8px;
            margin-right: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .list-info h2 {
            margin: 0; 
            color: var(--warm-brown);
            font-size: 26px; 
            font-family: 'Playfair Display', serif;
        }

        .list-info h3 {
            margin: 5px 0 0 0; 
            color: var(--terracotta);
            font-size: 18px; 
            font-family: 'Quicksand', sans-serif;
            font-weight: 300;
        }

        .view-btn {
            margin-left: auto;
            padding: 10px 25px;
            background: var(--sage-green);
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        
        .list-item:hover .view-btn {
            background: var(--warm-brown);
        }
    </style>
</head>
<body>

    <div id="aestheticOverlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← back to library</a>

    <div class="cover-container">
        <img src="Book1pages/self/img/s2.jpg" class="cover-photo" alt="Self-Help Banner">
        <h1 class="cover-title">Self-Help</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/self/iwtdbiwtet.html" class="list-item">
            <img src="Book1pages/self/img/iwtdbiwtet.jpg" alt="Book Cover">
            <div class="list-info">
                <h2>I Want to Die but I Want to Eat Tteokbokki</h2>
                <h3>Baek Sehee</h3>
            </div>
            <div class="view-btn">Read More</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('aestheticOverlay');
        const elements = ['☕', '☁️', '🏡', '🧸', '🍃', '🍵'];

        function createFloatingElement() {
            const el = document.createElement('div');
            el.className = 'element';
            el.innerText = elements[Math.floor(Math.random() * elements.length)];
            
            // Randomize starting position and destination
            const side = Math.floor(Math.random() * 4); // 0: Top, 1: Right, 2: Bottom, 3: Left
            let startX, startY, moveX, moveY;

            if(side === 0) { // Start Top
                startX = Math.random() * 100 + "vw";
                startY = "-5vh";
                moveX = (Math.random() - 0.5) * 200 + "px";
                moveY = "110vh";
            } else if(side === 1) { // Start Right
                startX = "105vw";
                startY = Math.random() * 100 + "vh";
                moveX = "-110vw";
                moveY = (Math.random() - 0.5) * 200 + "px";
            } else if(side === 2) { // Start Bottom
                startX = Math.random() * 100 + "vw";
                startY = "105vh";
                moveX = (Math.random() - 0.5) * 200 + "px";
                moveY = "-110vh";
            } else { // Start Left
                startX = "-5vw";
                startY = Math.random() * 100 + "vh";
                moveX = "110vw";
                moveY = (Math.random() - 0.5) * 200 + "px";
            }

            el.style.left = startX;
            el.style.top = startY;
            el.style.setProperty('--dx', moveX);
            el.style.setProperty('--dy', moveY);
            el.style.fontSize = (Math.random() * 15 + 15) + 'px';
            
            overlay.appendChild(el);
            setTimeout(() => el.remove(), 12000);
        }
        
        setInterval(createFloatingElement, 1500);
    </script>

</body>
</html>
