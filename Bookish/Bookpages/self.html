<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self-Help Nook</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Solway:wght@400;700&family=Indie+Flower&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warm-terracotta: #b07d62;
            --sage-green: #82937f;
            --oat-milk: #f7f3e9;
            --soft-brown: #5d4a44;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Solway', serif;
            background-color: var(--oat-milk); /* Fallback color */
            background-image: url('Book1pages/self/img/s2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- HEADER SECTION --- */
        .header-container {
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .banner-card {
            width: 90%;
            height: 380px;
            position: relative;
            border-radius: 40px;
            overflow: hidden; /* This clips the image to the rounded corners */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Using a real img tag ensures it loads more reliably than a CSS background */
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.15); /* Subtle darkening */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover-title {
            font-family: 'Dancing Script', cursive;
            font-size: 110px;
            color: white;
            margin: 0;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.4);
            z-index: 5;
        }

        /* --- BOOK LIST (Overlapping the banner) --- */
        .book-list-container {
            width: 95%;
            max-width: 750px;
            margin-top: -60px; /* Pulls the list up over the banner */
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 60px;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 60px; /* Pill shape */
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .list-item:hover {
            transform: translateY(-5px);
            background: #fff;
        }

        .list-item img { 
            width: 65px; height: 90px; 
            object-fit: cover; 
            border-radius: 12px;
            margin-right: 20px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }

        .list-info h2 {
            margin: 0; 
            color: var(--soft-brown);
            font-size: 1.1rem; 
        }

        .list-info h3 {
            margin: 3px 0 0 0; 
            color: var(--sage-green);
            font-size: 0.9rem;
            font-family: 'Indie Flower', cursive;
        }

        .view-btn {
            margin-left: auto;
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--dusty-rose), var(--warm-terracotta));
            color: white;
            border-radius: 30px;
            font-size: 12px;
            font-family: 'Comfortaa', cursive;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(176, 125, 98, 0.3);
        }

        /* Simple Navigation */
        .back-nav {
            position: absolute; top: 20px; left: 20px;
            color: var(--soft-brown); text-decoration: none;
            background: white; padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-family: 'Comfortaa'; z-index: 100;
        }
    </style>
</head>
<body>

    <a href="../Bookpages/book1.html" class="back-nav">← Back to Library</a>

    <header class="header-container">
        <div class="banner-card">
            <img src="Book1pages/self/img/s2.jpg" alt="Header" class="banner-img">
            <div class="banner-overlay">
                <h1 class="cover-title">Self-Help</h1>
            </div>
        </div>
    </header>

    <section class="book-list-container">
        <a href="Book1pages/self/iwtdbiwtet.html" class="list-item">
            <img src="Book1pages/self/img/iwtdbiwtet.jpg" alt="Book Cover">
            <div class="list-info">
                <h2>I Want to Die but I want to Eat Tteokbokki</h2>
                <h3>Baek Sehee</h3>
            </div>
            <div class="view-btn">Read Now</div>
        </a>

        </section>

</body>
</html>
