<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cozy Self-Help Nook</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Solway:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warm-terracotta: #b07d62;
            --sage-green: #82937f;
            --oat-milk: #f7f3e9;
            --soft-brown: #5d4a44;
            --dusty-rose: #d4a373;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Solway', serif;
            background-image: url('Book1pages/self/img/s2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--soft-brown);
        }

        /* --- FLOATING ELEMENTS SYSTEM --- */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10; 
        }

        .creature {
            position: absolute;
            user-select: none;
            opacity: 0;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
        }

        /* Directional animations */
        @keyframes driftUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes driftRight {
            0% { transform: translateX(-10vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateX(110vw) rotate(180deg); opacity: 0; }
        }

        @keyframes driftLeft {
            0% { transform: translateX(110vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateX(-10vw) rotate(-180deg); opacity: 0; }
        }

        /* --- NAVIGATION --- */
        .back-nav {
            position: fixed; top: 30px; left: 30px;
            color: var(--soft-brown); 
            text-decoration: none; 
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px; 
            font-family: 'Indie Flower', cursive;
            font-size: 1.2rem;
            z-index: 100;
            border-radius: 20px; 
            border: 1px dashed var(--warm-terracotta);
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .back-nav:hover {
            background: white;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* --- TITLE SECTION --- */
        .header-spacer {
            height: 45vh; /* Adjusted to show more of the top of the image */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .cover-title {
            font-family: 'Comfortaa', cursive;
            font-weight: 700;
            font-size: 85px;
            color: white;
            margin: 0;
            z-index: 3;
            /* Stronger shadow to ensure text pops against original image colors */
            text-shadow: 4px 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* --- BOOK LIST --- */
        .book-list-container {
            width: 850px; 
            margin: 0 auto 100px auto;
            display: flex;
            flex-direction: column;
            gap: 25px; 
            z-index: 5;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.92); /* Higher opacity for contrast */
            backdrop-filter: blur(8px);
            padding: 20px 30px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .list-item:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 1);
            border-color: var(--warm-terracotta);
        }

        .list-item img { 
            width: 95px; height: 140px; 
            object-fit: cover; 
            border-radius: 12px;
            margin-right: 30px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
        }

        .list-info h2 {
            margin: 0; 
            color: var(--soft-brown);
            font-size: 26px; 
            font-family: 'Solway', serif;
        }

        .list-info h3 {
            margin: 8px 0 0 0; 
            color: var(--sage-green);
            font-size: 20px; 
            font-family: 'Indie Flower', cursive;
        }

        .view-btn {
            margin-left: auto;
            padding: 12px 30px;
            background: var(--oat-milk);
            color: var(--warm-terracotta);
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Comfortaa', cursive;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid var(--warm-terracotta);
        }

        .view-btn:hover {
            background: var(--warm-terracotta);
            color: white;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← back to library</a>

    <div class="cover-container">
        <img src="Book1pages/self/img/s2.jpg" class="cover-photo" alt="Self-Help Banner">
        <h1 class="cover-title">Self-Help</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/self/iwtdbiwtet.html" class="list-item">
            <img src="Book1pages/self/img/iwtdbiwtet.jpg" alt="Book Cover">
            <div class="list-info">
                <h2>I Want to Die but I want to Eat Tteokbokki</h2>
                <h3>Baek Sehee</h3>
            </div>
            <div class="view-btn">Read Now</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        const creatures = ['☕', '☁️', '🧸', '🕯️', '🌿', '🍪', '✨', '🎀', '🌸', '🍂'];

        function createCreature() {
            const el = document.createElement('div');
            el.className = 'creature';
            el.innerText = creatures[Math.floor(Math.random() * creatures.length)];
            
            const side = Math.floor(Math.random() * 3);
            const duration = Math.random() * 8 + 10; // Slightly faster to feel more lively
            const size = Math.random() * 20 + 20;
            
            el.style.fontSize = size + 'px';

            if (side === 0) { // From Bottom
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '100vh';
                el.style.animation = `driftUp ${duration}s linear forwards`;
            } else if (side === 1) { // From Left
                el.style.left = '-10vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animation = `driftRight ${duration}s linear forwards`;
            } else { // From Right
                el.style.left = '110vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animation = `driftLeft ${duration}s linear forwards`;
            }

            overlay.appendChild(el);
            setTimeout(() => { el.remove(); }, duration * 1000);
        }

        setInterval(createCreature, 1200);
        for(let i=0; i<8; i++) setTimeout(createCreature, i * 400);
    </script>

</body>
</html>
