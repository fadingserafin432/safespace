<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self-Help Nook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Solway:wght@400;700&family=Indie+Flower&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --warm-terracotta: #b07d62;
            --sage-green: #82937f;
            --oat-milk: #f7f3e9;
            --soft-brown: #5d4a44;
            --dusty-rose: #d4a373;
            --accent-gradient: linear-gradient(135deg, #d4a373, #b07d62);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Solway', serif;
            background-image: url('Book1pages/self/img/s2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--soft-brown);
        }

        /* --- NAVIGATION --- */
        .back-nav {
            position: fixed; top: 20px; left: 20px;
            color: var(--soft-brown); 
            text-decoration: none; 
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 20px; 
            font-family: 'Comfortaa', sans-serif;
            font-size: 0.9rem;
            z-index: 100;
            border-radius: 30px; 
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        
        .back-nav:hover {
            background: white;
            transform: translateX(5px);
        }

        /* --- HEADER SECTION (The Banner) --- */
        .header-container {
            width: 100%;
            max-width: 900px;
            margin-top: 50px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .banner-card {
            width: 80%;
            height: 350px;
            background: url('Book1pages/self/img/s2.jpg'); /* Use your banner image */
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .banner-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.1); /* Softens the image for text readability */
        }

        .cover-title {
            font-family: 'Dancing Script', cursive; /* Script font like the image */
            font-size: 100px;
            color: white;
            position: relative;
            z-index: 2;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            margin: 0;
        }

        /* --- BOOK LIST (Overlapping) --- */
        .book-list-container {
            width: 90%;
            max-width: 750px;
            margin-top: -60px; /* This creates the overlap */
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 50px; /* Pill shape for the row */
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .list-item:hover {
            transform: scale(1.02);
        }

        .list-item img { 
            width: 70px; height: 100px; 
            object-fit: cover; 
            border-radius: 10px;
            margin-right: 20px;
        }

        .list-info h2 {
            margin: 0; 
            color: var(--soft-brown);
            font-size: 1.2rem; 
        }

        .list-info h3 {
            margin: 5px 0 0 0; 
            color: var(--sage-green);
            font-size: 0.9rem;
            font-style: italic;
        }

        .view-btn {
            margin-left: auto;
            padding: 10px 25px;
            background: var(--accent-gradient);
            color: white;
            border-radius: 30px;
            font-size: 12px;
            font-family: 'Comfortaa', cursive;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(176, 125, 98, 0.3);
        }

        /* Floaties System */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .creature { position: absolute; opacity: 0; }
        @keyframes driftUp {
            0% { transform: translateY(110vh); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← back to genres</a>

    <header class="header-container">
        <div class="banner-card">
            <h1 class="cover-title">Self-Help</h1>
        </div>
    </header>

    <section class="book-list-container">
        <a href="Book1pages/self/iwtdbiwtet.html" class="list-item">
            <img src="Book1pages/self/img/iwtdbiwtet.jpg" alt="Book Cover">
            <div class="list-info">
                <h2>I Want to Die but I want to Eat Tteokbokki</h2>
                <h3>Baek Sehee</h3>
            </div>
            <div class="view-btn">Read More</div>
        </a>
        
        </section>

    <script>
        // Keeping your charming floaty script!
        const overlay = document.getElementById('overlay');
        const creatures = ['☕', '☁️', '🌿', '✨', '🌸', '🍂'];
        function createCreature() {
            const el = document.createElement('div');
            el.className = 'creature';
            el.innerText = creatures[Math.floor(Math.random() * creatures.length)];
            const duration = Math.random() * 10 + 10;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            el.style.animation = `driftUp ${duration}s linear forwards`;
            overlay.appendChild(el);
            setTimeout(() => { el.remove(); }, duration * 1000);
        }
        setInterval(createCreature, 2000);
    </script>

</body>
</html>
