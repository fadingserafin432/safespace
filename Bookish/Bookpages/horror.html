<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horror Stories - Fading Spaces</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Courier+Prime&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blood-red: #660000;
            --bright-blood: #af0000;
            --deep-black: #050505;
            --smoke-grey: #1a1a1a;
            --stark-white: #ffffff;
            --shadow-glass: rgba(0, 0, 0, 0.9); /* Darker for the image look */
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Special Elite', serif;
            background: url('Book1pages/horrorstories/img/horror.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #d1d1d1;
        }

        /* --- UI ELEMENTS --- */
        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: white; text-decoration: none; 
            background: var(--blood-red);
            padding: 10px 20px; font-weight: bold; z-index: 100;
            text-transform: uppercase;
            border: 1px solid var(--bright-blood);
        }

        .cover-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 400px; /* Adjusted height */
            overflow: hidden;
            border-bottom: 3px solid var(--blood-red);
            z-index: 2;
        }

        .cover-photo { width: 100%; height: 100%; object-fit: cover; }

        .cover-title {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Creepster', cursive;
            font-size: 120px;
            color: #ffffff;
            text-align: center;
            width: 100%;
            letter-spacing: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 5px 5px 10px #000;
        }

        /* --- NEW BOOK LIST STYLING (Matching Image) --- */
        .book-list-container {
            width: 100%; 
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 20px; 
            padding-bottom: 100px;
        }

        .list-item {
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
            transition: 0.3s ease;
            height: 160px; /* Consistent slim height */
            border: 1px solid #111;
        }

        /* The Red Vertical Bar from the image */
        .list-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            bottom: 15%;
            width: 4px;
            background: var(--bright-blood);
        }

        .list-item:hover {
            background: rgba(10, 10, 10, 0.95);
            transform: scale(1.01);
        }

        .list-item img { 
            width: 85px; 
            height: 125px; 
            object-fit: cover; 
            margin-left: 40px; /* Space from the red bar */
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .list-info {
            flex-grow: 1;
            padding-left: 30px;
        }

        .list-info h2 {
            margin: 0; 
            color: #eee;
            font-size: 36px; 
            font-family: 'Courier Prime', monospace; /* Typewriter look */
            font-weight: bold;
        }

        .list-info h3 {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 18px;
            font-style: italic;
            font-family: 'Courier Prime', monospace;
        }

        /* The "Read More" button from the image */
        .view-btn {
            margin-right: 50px;
            border: 1px solid var(--blood-red);
            color: var(--blood-red);
            padding: 10px 30px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
            font-family: 'Courier Prime', monospace;
            transition: 0.3s;
        }

        .list-item:hover .view-btn {
            background: var(--blood-red);
            color: white;
        }
    </style>
</head>
<body>

    <a href="../Bookpages/book1.html" class="back-nav">← Exit Room</a>

    <div class="cover-container">
        <img src="Book1pages/horrorstories/img/h1.jpg" class="cover-photo" alt="Horror Banner">
        <h1 class="cover-title">HORROR</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/horrorstories/nocticadia.html" class="list-item">
            <img src="Book1pages/horrorstories/img/nocticadia.jpg" alt="Nocticadia">
            <div class="list-info">
                <h2>Nocticadia</h2>
                <h3>by Keri Lake</h3>
            </div>
            <div class="view-btn">Read More</div>
        </a>

        
    </section>

</body>
</html>
