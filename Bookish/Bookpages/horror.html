<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horror Stories - Fading Spaces</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blood-red: #660000;
            --bright-blood: #af0000;
            --deep-black: #050505;
            --smoke-grey: #1a1a1a;
            --stark-white: #ffffff; /* Changed to pure white */
            --shadow-glass: rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Special Elite', serif;
            /* REMOVED FILTERS: Background is now original color */
            background: url('Book1pages/horrorstories/img/horror.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: #d1d1d1;
        }

        /* --- HORROR ANIMATIONS --- */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
            80% { opacity: 0.8; }
        }

        /* Float animations for different directions */
        @keyframes floatRight { from { left: -100px; } to { left: 110vw; } }
        @keyframes floatLeft { from { left: 110vw; } to { left: -100px; } }
        @keyframes floatUp { from { top: 110vh; } to { top: -100px; } }
        @keyframes floatDown { from { top: -100px; } to { top: 110vh; } }

        .horror-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        .creepy-figure {
            position: absolute;
            user-select: none;
            opacity: 0.6;
            filter: drop-shadow(0 0 10px #000);
            z-index: 1;
            font-size: 50px;
            transition: transform 0.2s;
        }

        /* --- UI ELEMENTS --- */
        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: white; text-decoration: none; 
            background: var(--blood-red);
            padding: 10px 20px; font-weight: bold; z-index: 100;
            text-transform: uppercase;
            border: 1px solid var(--bright-blood);
        }

        .cover-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 550px;
            overflow: hidden;
            border-bottom: 3px solid var(--blood-red);
            z-index: 2;
        }

        .cover-photo { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            /* REMOVED FILTERS: Original color preserved */
        }

        .cover-title {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Creepster', cursive;
            font-size: 180px;
            color: #ffffff; /* PURE WHITE */
            margin: 0;
            text-align: center;
            width: 100%;
            z-index: 3;
            letter-spacing: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 5px 5px 10px #000;
            animation: flicker 4s infinite linear;
        }

        .book-list-container {
            width: 950px; 
            margin: 60px auto;
            display: flex;
            flex-direction: column;
            gap: 30px; 
            z-index: 5;
            padding-bottom: 100px;
        }

        .list-item {
            background: var(--shadow-glass);
            padding: 20px 40px;
            border-left: 8px solid var(--blood-red);
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .list-item img { 
            width: 90px; height: 130px; 
            object-fit: cover; 
            margin-right: 35px;
        }

        .list-info h2 {
            margin: 0; color: #fff;
            font-size: 32px; font-family: 'Creepster', cursive;
        }
    </style>
</head>
<body>

    <div class="horror-overlay" id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← Exit Room</a>

    <div class="cover-container">
        <img src="Book1pages/horrorstories/img/h1.jpg" class="cover-photo" alt="Horror Banner">
        <h1 class="cover-title">HORROR</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/horrorstories/nocticadia.html" class="list-item">
            <img src="Book1pages/horrorstories/img/nocticadia.jpg" alt="Nocticadia">
            <div class="list-info">
                <h2>Nocticadia</h2>
                <h3>by Keri Lake</h3>
            </div>
            <div class="view-btn">Read More</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        // Creepy figures to float around
        const creepyIcons = ['👻', '🧟', '🧛', '💀', '🤡', '👺', '👤'];

        function spawnFigure() {
            const el = document.createElement('div');
            el.className = 'creepy-figure';
            el.innerText = creepyIcons[Math.floor(Math.random() * creepyIcons.length)];
            
            // Randomize starting side: 0=Left, 1=Right, 2=Top, 3=Bottom
            const side = Math.floor(Math.random() * 4);
            const duration = Math.random() * 15 + 10; // 10-25 seconds
            
            if (side === 0) { // Coming from Left
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animation = `floatRight ${duration}s linear forwards`;
            } else if (side === 1) { // Coming from Right
                el.style.top = Math.random() * 100 + 'vh';
                el.style.animation = `floatLeft ${duration}s linear forwards`;
            } else if (side === 2) { // Coming from Top
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animation = `floatDown ${duration}s linear forwards`;
            } else { // Coming from Bottom
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animation = `floatUp ${duration}s linear forwards`;
            }

            overlay.appendChild(el);
            
            // Clean up element after animation
            setTimeout(() => { el.remove(); }, duration * 1000);
        }

        // Create a new figure every 2 seconds
        setInterval(spawnFigure, 2000);
    </script>

</body>
</html>
