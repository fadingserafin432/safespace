<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conspiracy Books</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Updated to a softer palette */
            --ufo-green: #2d5a27; /* Darker forest green for text readability on light bg */
            --alert-red: #a80000;
            --dark-brown: #654321; /* The requested Author color */
            --light-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Special Elite', Courier, monospace;
            /* Lighter overlay on the background image */
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), 
                        url('Book1pages/conspiracy/img/cons.jpg') no-repeat center center fixed;
            background-size: cover; 
            color: #333; /* Darker text for a light theme */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- UI Elements --- */
        
        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: #fff; text-decoration: none; 
            background: #444; /* Neutral dark gray instead of neon green */
            padding: 12px 24px; font-weight: bold; z-index: 100;
            text-transform: uppercase;
            border-radius: 2px;
            transition: 0.3s;
        }

        .back-nav:hover {
            background: #222;
            transform: scale(1.05);
        }

        .cover-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 400px;
            overflow: hidden;
            /* Removed neon green border-bottom and glow shadow */
            border-bottom: 2px solid #ccc;
            z-index: 2;
        }

        .cover-photo {
            width: 100%; height: 100%;
            object-fit: cover;
            /* Adjusted filter for a lighter, "old paper" feel */
            filter: grayscale(0.5) sepia(0.2) brightness(0.8);
        }

        .cover-title {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif; font-size: 80px;
            color: #fff; text-align: center; width: 100%;
            z-index: 3; letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* --- Book List --- */

        .book-list-container {
            width: 800px; margin: 50px auto;
            display: flex; flex-direction: column; gap: 25px; 
            z-index: 2;
        }

        .list-item {
            background: var(--light-bg);
            padding: 20px; 
            border: 1px solid #ddd; /* Subtle border */
            display: flex; align-items: center; 
            text-decoration: none;
            transition: 0.3s;
            position: relative;
            /* Removed the neon green border-left */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .list-item:hover { 
            background: #fff;
            border-color: #bbb;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .list-info h3 {
            margin: 5px 0 0 0;
            color: var(--dark-brown); /* Caramel White Author Name */
            font-size: 18px;
            /* Adding a slight dark text-stroke or shadow to make white text visible on light bg */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .view-btn {
            margin-left: auto; padding: 12px 25px;
            background: transparent; 
            color: #444;
            border: 1px solid #444;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        }

        .view-btn:hover {
            background: #444;
            color: #fff;
        }

        /* --- Original animations kept but toned down for light theme --- */
        .conspiracy-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10; 
        }

        .evidence-sticker {
            position: absolute;
            user-select: none;
            opacity: 0.3;
            white-space: nowrap;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="conspiracy-overlay" id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← back to Library</a>

    <div class="cover-container">
        <img src="Book1pages/conspiracy/img/cons1.jpg" class="cover-photo" alt="Classified Image">
        <h1 class="cover-title">Conspiracy</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/conspiracy/tls.html" class="list-item">
            <img src="Book1pages/conspiracy/img/tls.jpg" alt="The Lost Symbol" 
                 style="width:110px; height:160px; margin-right:30px; border: 1px solid #ccc;">
            
            <div class="list-info">
                <h2 style="margin:0; color:#222; font-size: 24px;">The Lost Symbol</h2>
                <h3>by Dan Brown</h3>
            </div>
            
            <div class="view-btn">Read Now</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        const stickers = ['🛸', '👁️', '🕵️', '👽', '📡', '📁', '📼', '🔇', '🔒', '🔺'];
        const labels = ['CONFIDENTIAL', 'REDACTED', 'TOP SECRET', 'SIGHTING', 'NO COMMENT'];

        function createConspiracyElement() {
            const el = document.createElement('div');
            el.className = 'evidence-sticker';
            
            if (Math.random() > 0.6) {
                el.innerText = labels[Math.floor(Math.random() * labels.length)];
                el.style.color = '#444'; 
                el.style.border = `1px solid #444`;
                el.style.padding = '2px 8px';
                el.style.fontSize = '10px';
                el.style.fontWeight = 'bold';
                el.style.background = 'rgba(255,255,255,0.8)';
            } else {
                el.innerText = stickers[Math.floor(Math.random() * stickers.length)];
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            }

            el.style.left = (Math.random() * 95) + 'vw';
            el.style.animation = `drift ${Math.random() * 10 + 10}s linear forwards`;
            
            overlay.appendChild(el);
            setTimeout(() => el.remove(), 15000);
        }

        setInterval(createConspiracyElement, 2000); // Slower frequency for cleaner look
    </script>

</body>
</html>
