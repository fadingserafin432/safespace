<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CLASSICS ARCHIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --caramel-white: #f7f1e3;
            --antique-gold: #c5a059;
            --russet-leather: #5d4037;
            /* Fluid font size: scales between 14px and 18px based on screen size */
            --base-font: clamp(14px, 2vw, 18px); 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Playfair Display', serif;
            background: #2b2319 url('Book1pages/classics/img/c1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--caramel-white);
            min-height: 100vh;
        }

        /* --- THE COVER (Flexible Height) --- */
        .cover-container {
            position: relative;
            width: 100%;
            /* vh means 'viewport height'. This makes it look grand on any screen */
            height: 40vh; 
            min-height: 250px;
            max-height: 450px;
            overflow: hidden;
            border-bottom: 4px solid var(--antique-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .cover-photo {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            z-index: 1;
        }

        .cover-title {
            position: relative;
            z-index: 2;
            font-family: 'Cinzel', serif;
            /* Scales the title so it's big on desktop, readable on mobile */
            font-size: clamp(30px, 8vw, 60px); 
            letter-spacing: 0.2em;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
            margin: 0;
            text-align: center;
        }

        /* --- THE LIST (Adapts to Width) --- */
        .book-list-container {
            max-width: 900px; /* Limits width on desktop so it's not "stretched" */
            width: 95%;      /* Fills screen on mobile */
            margin: 30px auto;
            display: grid;
            gap: 15px;
            padding-bottom: 50px;
        }

        .list-item {
            background: var(--caramel-white);
            padding: 15px;
            border: 1px solid var(--antique-gold);
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .list-item:hover {
            transform: translateY(-3px);
            background: #fff;
        }

        .book-thumb {
            width: clamp(50px, 10vw, 80px); /* Thumbnail scales with screen */
            aspect-ratio: 2/3;
            margin-right: 20px;
            object-fit: cover;
            border: 1px solid #999;
        }

        .list-info { flex: 1; }

        .list-info h2 {
            margin: 0; color: #333;
            font-family: 'Cinzel', serif;
            font-size: clamp(16px, 4vw, 22px);
        }

        .list-info h3 {
            margin: 5px 0 0; color: #666;
            font-style: italic;
            font-size: clamp(12px, 2vw, 14px);
        }

        .view-btn {
            padding: 10px 15px;
            border: 1px solid var(--antique-gold);
            color: var(--russet-leather);
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .back-nav {
            position: fixed; top: 20px; left: 20px;
            z-index: 100;
            color: var(--caramel-white);
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border: 1px solid var(--antique-gold);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <a href="../Bookpages/book1.html" class="back-nav">← LIBRARY</a>

    <div class="cover-container">
        <img src="Book1pages/classics/img/c2.jpg" class="cover-photo" alt="Cover">
        <h1 class="cover-title">CLASSICS</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/classics/vf.html" class="list-item">
            <img src="Book1pages/classics/img/vf.jpg" class="book-thumb" alt="Vanity Fair">
            <div class="list-info">
                <h2>Vanity Fair</h2>
                <h3>William Makepeace Thackeray</h3>
            </div>
            <div class="view-btn">Read Now</div>
        </a>
    </section>

</body>
</html>
