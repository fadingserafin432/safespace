<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CLASSICS ARCHIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --caramel-white: #f7f1e3;
            --antique-gold: #c5a059;
            --russet-leather: #5d4037;
            --moss-green: #4b5d44;
            --ink-glaze: rgba(43, 35, 25, 0.8);
        }

        html { height: 100%; margin: 0; padding: 0; }

        body {
            margin: 0; padding: 0;
            font-family: 'Playfair Display', serif;
            background: url('Book1pages/classics/img/c1.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #2b2319;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            color: var(--russet-leather);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 5;
        }

        .classics-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* --- UI STYLES --- */
        .back-nav {
            position: absolute; top: 15px; left: 15px;
            color: var(--caramel-white); 
            text-decoration: none; 
            background: var(--russet-leather);
            padding: 6px 12px; 
            font-size: 10px;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--antique-gold);
        }

        .cover-container {
            position: relative;
            width: 100%;
            /* Locked to mobile width */
            max-width: 450px; 
            height: 250px; 
            overflow: hidden;
            border-bottom: 5px double var(--antique-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 2;
        }

        .cover-photo { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.2); }

        .cover-title {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; 
            /* Scaled down for mobile-only look */
            font-size: 40px; 
            color: var(--caramel-white); 
            text-align: center; width: 100%;
            z-index: 3; 
            letter-spacing: 8px;
            text-shadow: 2px 2px 0px var(--antique-gold), 4px 4px 10px rgba(0,0,0,0.8);
        }

        /* --- MOBILE-FORMAT BOOK LIST --- */
        .book-list-container {
            width: 90%;
            /* Locked to mobile width */
            max-width: 400px; 
            margin: 30px auto;
            display: flex; flex-direction: column; gap: 15px; 
            z-index: 2; padding-bottom: 60px;
        }

        .list-item {
            background: var(--caramel-white);
            padding: 12px;
            border: 1px solid var(--antique-gold);
            display: flex; align-items: center; text-decoration: none;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s ease;
        }

        .list-item:hover { transform: translateX(5px); }

        .list-item::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
            background: var(--antique-gold);
        }

        .book-thumb {
            width: 50px; height: 75px; 
            margin-right: 15px; 
            border: 1px solid #ddd;
            object-fit: cover;
        }

        .list-info { flex: 1; }

        .list-info h2 {
            margin: 0; color: var(--russet-leather); 
            font-family: 'Cinzel'; font-size: 16px; 
            margin-bottom: 2px;
        }

        .list-info h3 {
            margin: 0; color: var(--moss-green); 
            font-style: italic; font-weight: 400; font-size: 12px;
        }

        .view-btn {
            padding: 6px 10px;
            background: transparent;
            color: var(--russet-leather);
            border: 1px solid var(--antique-gold);
            font-size: 9px; letter-spacing: 1px; 
            text-transform: uppercase;
        }

        /* Floating elements */
        .literary-element { position: fixed; user-select: none; opacity: 0; z-index: 11; pointer-events: none; }
        @keyframes drift-down { 0% { transform: translateY(-10vh); opacity: 0; } 20% { opacity: 0.5; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>
<body>

    <div class="classics-overlay" id="overlay"></div>
    <a href="../Bookpages/book1.html" class="back-nav">← Library</a>

    <div class="cover-container">
        <img src="Book1pages/classics/img/c2.jpg" class="cover-photo" alt="Historical Spines">
        <h1 class="cover-title">CLASSICS</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/classics/vf.html" class="list-item">
            <img src="Book1pages/classics/img/vf.jpg" class="book-thumb" alt="Vanity Fair">
            <div class="list-info">
                <h2>Vanity Fair</h2>
                <h3>William Makepeace Thackeray</h3>
            </div>
            <div class="view-btn">Read</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        const items = ['📜', '🗝️', '🕯️', '🖋️', '📖'];
        
        function createLiteraryElement() {
            const el = document.createElement('div');
            el.className = 'literary-element';
            el.innerText = items[Math.floor(Math.random() * items.length)];
            el.style.fontSize = '20px';
            el.style.left = Math.random() * 90 + 'vw';
            const duration = Math.random() * 5 + 10;
            el.style.animation = `drift-down ${duration}s linear forwards`;
            overlay.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000);
        }
        setInterval(createLiteraryElement, 3000);
    </script>
</body>
</html>
