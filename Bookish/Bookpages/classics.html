<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CLASSICS ARCHIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --caramel-white: #f7f1e3;
            --antique-gold: #c5a059;
            --russet-leather: #5d4037;
            --moss-green: #4b5d44;
            --ink-glaze: rgba(43, 35, 25, 0.8);
        }

        /* Essential for full-page background */
        html {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0; 
            padding: 0;
            font-family: 'Playfair Display', serif;
            /* Background Image Fixes */
            background: url('Book1pages/classics/img/c1.jpg') no-repeat center center fixed;
            background-size: cover; /* This makes the image fill the whole page */
            background-color: #2b2319; /* Fallback */
            
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            color: var(--russet-leather);
        }

        /* Subtle grain texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 5;
        }

        .classics-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* --- Floating Elements --- */
        .literary-element {
            position: fixed;
            user-select: none;
            opacity: 0;
            filter: sepia(0.5) drop-shadow(0 0 5px rgba(0,0,0,0.3));
            z-index: 11;
        }

        @keyframes drift-down {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes drift-up {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(-360deg); opacity: 0; }
        }

        @keyframes drift-right {
            0% { transform: translateX(-10vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateX(110vw) rotate(180deg); opacity: 0; }
        }

        @keyframes drift-left {
            0% { transform: translateX(110vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateX(-10vw) rotate(-180deg); opacity: 0; }
        }

        /* --- UI STYLES --- */
        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: var(--caramel-white); 
            text-decoration: none; 
            background: var(--russet-leather);
            padding: 10px 25px; 
            font-size: 14px;
            z-index: 100;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid var(--antique-gold);
            box-shadow: 4px 4px 15px rgba(0,0,0,0.5);
        }

        .cover-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 480px;
            overflow: hidden;
            border-bottom: 12px double var(--antique-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 2;
        }

        .cover-photo {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: contrast(1.1) sepia(0.2);
        }

        .cover-title {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif; font-size: 120px;
            color: var(--caramel-white); 
            text-align: center; width: 100%;
            z-index: 3; letter-spacing: 20px;
            text-shadow: 5px 5px 0px var(--antique-gold), 10px 10px 25px rgba(0,0,0,0.8);
        }

        .book-list-container {
            width: 90%;
            max-width: 900px; 
            margin: 60px auto;
            display: flex; flex-direction: column; gap: 35px; 
            z-index: 2; padding-bottom: 100px;
        }

        .list-item {
            background: var(--caramel-white);
            padding: 25px; 
            border: 1px solid var(--antique-gold);
            display: flex; align-items: center; text-decoration: none;
            position: relative;
            box-shadow: inset 0 0 100px rgba(197, 160, 89, 0.1), 10px 15px 30px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }

        .list-item:hover { 
            transform: translateY(-8px);
            box-shadow: inset 0 0 100px rgba(197, 160, 89, 0.2), 15px 25px 40px rgba(0,0,0,0.5);
        }

        .list-item::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px;
            background: linear-gradient(to right, var(--antique-gold), var(--russet-leather));
        }

        .book-thumb {
            width: 120px; height: 180px; 
            margin-right: 40px; 
            border: 3px solid white;
            box-shadow: 8px 8px 20px rgba(0,0,0,0.3);
            filter: grayscale(0.2);
            object-fit: cover;
        }

        .list-info h2 {
            margin: 0; 
            color: var(--russet-leather); 
            font-family: 'Cinzel'; 
            font-size: 32px;
            border-bottom: 1px solid var(--antique-gold);
            display: inline-block;
            margin-bottom: 10px;
        }

        .list-info h3 {
            margin: 0; 
            color: var(--moss-green); 
            font-style: italic;
            font-weight: 400;
        }

        .view-btn {
            margin-left: auto; padding: 15px 30px;
            background: var(--moss-green); 
            color: var(--caramel-white);
            border: 1px solid var(--antique-gold);
            font-size: 12px; letter-spacing: 3px; 
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .list-item:hover .view-btn {
            background: var(--russet-leather);
            box-shadow: 0 0 15px var(--antique-gold);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .cover-title { font-size: 60px; letter-spacing: 10px; }
            .list-item { flex-direction: column; text-align: center; }
            .book-thumb { margin-right: 0; margin-bottom: 20px; }
            .view-btn { margin: 20px auto 0; }
        }
    </style>
</head>
<body>

    <div class="classics-overlay" id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← To Collection</a>

    <div class="cover-container">
        <img src="Book1pages/classics/img/c2.jpg" class="cover-photo" alt="Historical Spines">
        <h1 class="cover-title">CLASSICS</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/classics/vf.html" class="list-item">
            <img src="Book1pages/classics/img/vf.jpg" class="book-thumb" alt="Vanity Fair">
            <div class="list-info">
                <h2>Vanity Fair</h2>
                <h3>William Makepeace Thackeray</h3>
            </div>
            <div class="view-btn">View Volume</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        const items = ['📜', '🗝️', '🕯️', '🖋️', '🏺', '👑', '✉️', '📖', '🏛️'];
        const directions = ['down', 'up', 'left', 'right'];

        function createLiteraryElement() {
            const el = document.createElement('div');
            el.className = 'literary-element';
            el.innerText = items[Math.floor(Math.random() * items.length)];
            
            el.style.fontSize = (Math.random() * 30 + 30) + 'px'; 
            
            const dir = directions[Math.floor(Math.random() * directions.length)];
            const duration = Math.random() * 8 + 12; 

            if (dir === 'down' || dir === 'up') {
                el.style.left = Math.random() * 90 + 'vw';
            } else {
                el.style.top = Math.random() * 90 + 'vh';
            }

            el.style.animation = `drift-${dir} ${duration}s linear forwards`;

            overlay.appendChild(el);
            
            setTimeout(() => el.remove(), duration * 1000);
        }

        // Initial elements
        for(let i=0; i<5; i++) {
            setTimeout(createLiteraryElement, i * 1000);
        }

        // Loop
        setInterval(createLiteraryElement, 2500);
    </script>

</body>
</html>
