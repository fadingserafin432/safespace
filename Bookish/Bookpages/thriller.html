<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thriller Stories - Fading Spaces</title>
    <meta name="viewport" content="width=1200">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blood-red: #8b0000;
            --deep-black: #0a0a0a;
            --smoke-grey: #2c2c2c;
            --stark-white: #e0e0e0;
            --shadow-glass: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Special Elite', serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('../../assets/t.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--stark-white);
        }

        /* --- UPDATED MULTI-DIRECTIONAL ANIMATIONS --- */
        .thriller-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1; 
        }

        .thriller-obj {
            position: absolute;
            user-select: none;
            opacity: 0;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
        }

        @keyframes driftDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(45deg); opacity: 0; }
        }

        @keyframes driftUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(-45deg); opacity: 0; }
        }

        @keyframes driftLeft {
            0% { transform: translateX(110vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateX(-10vw) rotate(-90deg); opacity: 0; }
        }

        @keyframes driftRight {
            0% { transform: translateX(-10vw) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateX(110vw) rotate(90deg); opacity: 0; }
        }

        /* --- UI STYLES --- */
        .back-nav {
            position: absolute; top: 30px; left: 30px;
            color: var(--stark-white); text-decoration: none; 
            background: var(--blood-red);
            padding: 10px 20px; font-weight: bold; z-index: 100;
            text-transform: uppercase;
            border-radius: 4px; box-shadow: 0 0 15px rgba(139,0,0,0.5);
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-nav:hover {
            background: #ff0000;
            box-shadow: 0 0 25px rgba(255,0,0,0.7);
        }

        .cover-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 550px;
            overflow: hidden;
            border-bottom: 5px solid var(--blood-red);
            box-shadow: 0 10px 60px rgba(0,0,0,0.9);
            z-index: 2;
        }

        .cover-photo { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: grayscale(0.8) contrast(1.2) brightness(0.6); 
        }

        .cover-title {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Creepster', cursive;
            font-size: 160px;
            color: #ffffff; 
            margin: 0;
            text-align: center;
            width: 100%;
            z-index: 3;
            letter-spacing: 15px;
            text-shadow: 4px 4px 0px #000, 0 0 25px rgba(139, 0, 0, 0.9);
        }

        .book-list-container {
            width: 950px; 
            margin: 60px auto;
            display: flex;
            flex-direction: column;
            gap: 40px; 
            z-index: 2;
            padding-bottom: 100px;
        }

        /* --- CREEPY SYMBOL BORDERS --- */
        .list-item {
            background: var(--shadow-glass);
            padding: 25px 40px;
            border-left: 5px solid var(--blood-red);
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s ease;
            position: relative;
            z-index: 5;
            overflow: visible;
        }

        /* Top and Bottom Symbol Rows */
        .list-item::before, .list-item::after {
            content: "† ‡ ♆ ☠ ☥ ♆ ‡ † ☠ ☥ ♆ ‡ † ☠ ☥ ♆ ‡ †";
            position: absolute;
            width: 100%;
            left: 0;
            font-size: 12px;
            color: rgba(139, 0, 0, 0.4);
            letter-spacing: 15px;
            text-align: center;
            pointer-events: none;
            transition: 0.5s;
        }

        .list-item::before { top: -15px; }
        .list-item::after { bottom: -15px; }

        .list-item:hover {
            transform: scale(1.02);
            background: #151515;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
        }

        .list-item:hover::before, .list-item:hover::after {
            color: var(--blood-red);
            letter-spacing: 18px;
            text-shadow: 0 0 10px var(--blood-red);
        }

        .list-item img { 
            width: 90px; height: 130px; 
            object-fit: cover; 
            filter: grayscale(0.5);
            margin-right: 35px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .list-info h2 {
            margin: 0; color: var(--stark-white);
            font-size: 28px; font-family: 'Special Elite', serif;
        }

        .list-info h3 {
            margin: 5px 0 0 0; color: #666;
            font-size: 16px; font-weight: 400; font-style: italic;
        }

        .view-btn {
            margin-left: auto;
            padding: 12px 30px;
            background: transparent;
            color: var(--blood-red);
            border: 2px solid var(--blood-red);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .list-item:hover .view-btn {
            background: var(--blood-red);
            color: white;
        }
    </style>
</head>
<body>

    <div class="thriller-overlay" id="overlay"></div>

    <a href="../Bookpages/book1.html" class="back-nav">← Back to Library</a>

    <div class="cover-container">
        <img src="Book1pages/thrillerstories/img/t2.jpg" class="cover-photo" alt="Thriller Banner">
        <h1 class="cover-title">THRILLER</h1>
    </div>

    <section class="book-list-container">
        <a href="Book1pages/thrillerstories/thfro.html" class="list-item">
            <img src="Book1pages/thrillerstories/img/t1.jpg" alt="The Hunt for Red October">
            <div class="list-info">
                <h2>The Hunt for Red October</h2>
                <h3>by Tom Clancy</h3>
            </div>
            <div class="view-btn">Read More</div>
        </a>
    </section>

    <script>
        const overlay = document.getElementById('overlay');
        const objects = ['🐦‍⬛', '🔪', '🩸', '💀', '👣', '👁️'];
        const animations = ['driftDown', 'driftUp', 'driftLeft', 'driftRight'];

        function createObject() {
            const el = document.createElement('div');
            el.className = 'thriller-obj';
            el.innerText = objects[Math.floor(Math.random() * objects.length)];
            
            // Randomize starting position
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            
            const size = Math.random() * 25 + 20;
            el.style.fontSize = size + 'px';

            // Choose a random direction/animation
            const anim = animations[Math.floor(Math.random() * animations.length)];
            const duration = Math.random() * 10 + 8;
            el.style.animation = `${anim} ${duration}s linear forwards`;

            overlay.appendChild(el);
            
            // Clean up memory
            setTimeout(() => { el.remove(); }, duration * 1000);
        }

        // Create objects at regular intervals
        setInterval(createObject, 1000);
    </script>

</body>
</html>
